services:
  nexa-api:
    build: .
    container_name: nexa-api
    volumes:
      - .:/app
    command: python chat.py --checkpoint checkpoints/best.pt --port 7860
    ports:
      - "7860:7860"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - 'OPENAI_API_BASE_URL=http://nexa-api:7860/v1'
      - 'OPENAI_API_KEY=nexa-key'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    restart: always
    depends_on:
      - open-webui
